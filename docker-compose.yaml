version: "3.9"
services:
  tarkov-net:
    container_name: tarkov-net
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: http://YOUR_UNRAID_IP:3000
      NEXTAUTH_SECRET: change-me
      DATABASE_URL: file:/app/prisma/dev.db
    volumes:
      - ./prisma:/app/prisma
